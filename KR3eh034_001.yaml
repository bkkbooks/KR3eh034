body:
  text: 男科卷一傷寒門初病說凡病初起之時用藥原易奏功無如世人看不清症用藥雜亂往往致變症蜂起苟看病情用藥當何變症之有傷風凡人初傷風必然頭痛身痛咳嗽痰多鼻流清水切其脈必浮方用荊芥防風柴胡黃芩半夏甘草各等分水煎服一劑即止不必再劑也傷寒凡傷寒初起鼻塞目痛項強頭痛切其脈必浮緊方用桂枝乾葛陳皮甘草各等分水煎服一劑即愈外感凡人外感必然發熱方用柴胡黃芩荊芥半夏甘草各等分水煎服四時不正之氣來犯人身必然由皮毛而入營衛故用柴胡荊芥先散皮毛之邪邪即先散安得入內又有半夏以祛痰使邪不得挾痰以作祟黃芩以清火使邪不得挾火以作殃甘草調藥以和中是以邪散而無傷於正氣也若內傷之發熱則不可用此方傷食凡傷食必心中飽悶見食則惡食之轉痛也方用白朮一錢茯苓一錢枳殼一錢穀芽二錢麥芽二錢山楂二十個神麯五錢半夏一錢甘草五分砂仁三粒水煎服一劑輕二劑愈瘧疾方用遇仙丹生軍陸兩檳榔叄兩三稜叄兩莪朮叄兩黑醜三兩白醜三兩木香二兩甘草一兩水丸遇發日清晨溫水化三四丸尋以溫米飯補之忌生冷魚腥蕎麵孕婦勿服傷暑人感此症必然頭暈口渴惡熱甚則痰多身熱氣喘方用人參一錢白朮五錢茯苓三錢甘草一錢青蒿一兩香薷三錢陳皮一錢水煎服一劑愈大滿此邪在上焦壅塞而不得散也方用瓜蔞一個搗碎枳殼三錢天花粉三錢梔子二錢陳皮三錢厚朴錢半半夏一錢甘草一錢水煎服此方之妙全在用瓜蔞能去胸膈之食而消上焦之痰況又佐以枳殼花粉同是消中聖藥又有厚朴半夏以消胃口之痰尤妙在甘草使群藥留中而不速下則邪氣不能久存而散矣發汗凡入邪居腠理之間必須用汗藥以泄之方用荊芥防風甘草桔梗蘇葉各一錢白朮五錢雲苓三錢陳皮五分水煎服此方妙在君白朮蓋人之脾胃健而後皮毛腠理始得開合自如白朮健脾去濕而邪難存況有荊防蘇梗以表散之乎寒熱冥假瓣真熱症口乾極而呼水舌燥極而開裂生刺喉痛日夜不已大熱烙手而無汗也真寒症手足寒久而不回色變青紫身戰不已口噤出聲而不可噤也假熱症口雖渴而不甚舌雖干而不燥即燥而無芒刺紋裂也假寒症手足冰冷而有時溫和厥逆身戰亦未太甚而有時而安有時而搐是也乍寒乍熱辨病有灑淅惡寒而後發熱者蓋陰脈不足陽往從之陽脈不足陰往乘之何謂陽不足寸脈微名曰陽不足陰氣上入陽中則惡寒也何謂陰不足尺脈弱名曰陰不足陽氣下陷陰中則發熱也凡治寒熱用柴胡升陽氣使不下陷陰中則不熱也用黃芩降陰氣使不升入陽中則不寒也真熱方用麻黃三錢當歸五錢黃連黃芩石膏知母半夏各三錢枳殼二錢甘草一錢水煎服一劑輕二劑愈真寒方用附子三錢肉桂乾薑各一錢白朮五錢人參一兩水煎服急救之此乃真中寒邪腎火避出軀殼之外而陰邪之氣直犯心宮心君不守肝氣無依乃發戰發噤手足現青色然則用桂附乾薑逐其寒邪足矣何用參術即用何至多加蓋元氣飛越只一線之氣未絕純用桂附乾薑一派辛辣之藥邪雖外逐而正氣垂絕若不多加參術何以反正氣於若存若亡之際哉假熱方用黃連當歸白芍半夏各三錢茯苓柴胡梔子各二錢枳殼一錢菖蒲三錢水煎服此方妙在用黃連入心宮佐以梔子提刀直入無邪不散柴胡白芍又塞敵運糧之道半夏枳殼斬殺黨余中原既定四隅不戰而歸然火勢居中非用之得法是賊勢彌張依然復人又加菖蒲之辛熱乘熱飲之則熱喜熱不致相反而更相濟也假寒方用肉桂附子各一錢人參三錢白朮五錢豬膽汁半個苦菜汁十三匙水三杯煎一杯冷服將藥並器放冷水中激涼入膽菜汁調勻一氣服之方中全是熱藥倘服不入式必然虛火上衝將藥嘔出必熱藥涼服已足順其性況下行又有二汁之苦以騙其假道之防也哉真熱假寒此症身外冰冷身內火熾發寒發熱戰慄不已乃真熱反現假寒之象以欺人也法當用三黃湯加石膏生薑乘熱飲之再用井水以撲其心至二三十次內熱自止外之戰慄亦若失矣後用元參麥冬白芍各二兩煎湯任其恣飲後不再甚也真寒假熱此症下部冰冷上部大熱渴欲飲水下喉即吐乃真寒反現假熱之形以欺人也法當用八味湯大劑探冷與服再令人以手擦其足心如火之熱不熱不已以大熱為度用吳萸一兩附子一錢麝香三分以少許白麵人之打糊作膏貼足心少頃必睡醒來下部熱而上部之火息矣上熱下寒此症上焦火盛吐痰如湧泉面赤喉痛上身不欲蓋衣而下身冰冷此上假熱而下真寒也方用附子一個熟地半斛山萸四兩麥冬一兩茯苓三兩五味子一兩丹皮三兩澤瀉三兩肉桂一兩水十碗煎三碗探冷與服二渣再用水三碗煎一碗一氣服之立刻安靜此上病下治之法也循衣撮空此症非大實即大虛當審其因察其脈參其症而黑白分也實而便秘者大承氣湯虛而便滑者獨參湯厥逆者加附子陰虛雙娥方用附子一錢鹽水炒每用一片含口中後以六味地黃湯大劑飲之外治法引火下行用附子一個為末醋調貼湧泉穴或吳萸一兩白麵五錢水調貼湧泉穴急針刺少商穴則咽喉有一線之路矣結胸此傷寒之變症也傷寒邪火正熾不可急與飲食飲食而成此症者方用瓜蔞一個捶碎甘草一錢水煎服勿遲瓜蔞乃結胸之聖藥也人服之必至心如遺落病人服之不畏其虛乎不知結胸之症是食在胸中非大黃枳殼檳榔厚朴所能祛逐必得瓜蔞始得推盪開脾少加甘草以和之不至十分猛烈也扶正散邪湯人參一錢白朮茯苓柴胡各三錢半夏甘草各一錢水煎服此方專治正氣虛而邪氣入之者如頭痛發熱右寸脈大於左寸口者急以此方投之無不痊愈火症門瀉火湯總方梔子三錢白芍五錢丹皮三錢元參二錢甘草一錢水煎服心火加黃連一錢胃火加生石膏三錢腎火加黃柏知母各一錢肺火加黃芩一錢大腸火加地榆一錢小腸火加天冬麥冬各一錢膀胱火加澤瀉三錢治火何獨治肝經蓋肝屬木最易生火肝火散則諸經之火俱散但散火必須用下泄之藥而使火之有出路也則得矣火症真火症初起必大渴引飲身有斑點或身熱如焚或發狂亂語方用石膏知母各三錢元參一兩甘草升麻各三錢麥冬一兩半夏三錢竹葉一百片水煎服一劑少止三劑愈火越此乃胃火與肝火共騰而外越不為丹毒即為痧疹非他火也方用元參一兩乾葛三兩升麻青蒿黃耆各三錢水煎服此方妙在用青蒿肝胃之火俱平又佐以群藥重劑而火安有不減者乎治小兒亦效燥症此症初起喉於口渴乾燥不吐痰乾咳不已面色日紅不畏風吹者是也方用麥冬元參各五錢桔梗三錢甘草一錢陳皮三分百部八分花粉一錢水煎服治火丹神方絲瓜子一兩柴胡一錢元參一兩升麻一錢當歸五錢水煎服小兒服之亦效消食病此火盛之病大渴引飲呼水自救朝食即飢或夜食不止方用元參一兩麥冬五錢生地三錢竹葉三十片菊花白芥子丹皮各二錢陳皮五分水煎服痿症不能起床已成廢人者此乃火盛內熾腎水熬干治法宜降胃火以補腎水方用降補湯熟地元參各一兩甘菊花五錢麥冬一兩生地五錢車前子二錢人參三錢沙參五錢地骨皮五錢水煎服痿症人有兩足無力不能起立而又健飯少飢即頭面皆熱咳嗽不已此亦痿症方用起痿至神湯熟地元參山藥菊花各一兩當歸白芍人參各五錢神麯二錢白芥子三錢水煎服三十劑而愈鬱結門開鬱如人頭痛身熱傷風咳嗽或心不爽而鬱氣蘊結中懷或氣不舒而怒氣留於脅下斷不可用補藥方用當歸三錢白芍五錢柴胡一錢半夏二錢枳殼一錢甘草一錢白朮二錢丹皮薄荷各一錢水煎服頭痛加川芎一錢目痛加蒺藜一錢菊花一錢鼻塞加蘇葉一錢喉痛加桔梗二錢肩背痛加枳殼羌活兩手痛加薑黃或桂枝一錢腹痛不可按者加大黃二錢按之而不痛者加肉桂一錢余不必加關格怒氣傷肝而肝氣衝於胃口之間腎氣不得上行肺氣不得下行而成此症以開鬱為主方用荊芥柴胡川鬱金茯苓蘇子白芥子各一錢白芍三錢甘草五分花粉一錢水煎服又方用陰陽水各一碗加鹽一撮打百餘下起泡飲之即愈凡上焦有疾欲吐而不能吐者飲之即吐虛勞門癆症虛損瓣二症外相似而治法不同虛損者陰陽兩虛也癆症者陰虛陽亢也故虛損可用溫補癆症則忌溫補而用清補兩症辨法不必憑脈但看人著復衣此著單衣者為癆症人著單衣此著復衣者為虛損癆症骨蒸而熱虛損榮衛虛而損也內傷發熱方用當歸一錢白芍二錢柴胡陳皮梔子各一錢花粉二錢甘草一錢水煎服凡肝木鬱者此方一劑即快人病發熱有內傷外感必先散其邪氣邪氣退而後補正氣正不為邪氣所傷也但外感內傷不可用一方也未成勞而將成勞方用熟地一兩地骨皮人參麥冬各五錢白芥子三錢白朮一錢山藥三錢五味子三分水煎服凡人右寸脈大於左寸脈即內傷之症不論左右關尺脈何如以此方投之效驗陽虛下陷凡人飢飽勞役內傷正氣以致氣乃下行脾胃不行克化飲食不能運動往往變成勞瘵蓋疑飲食不進為脾胃之病肉黍之積輕則砂仁枳殼山楂麥芽之品重則芒硝大黃牽牛巴豆之類紛然雜進必致膨悶而漸成勞矣若先以升提之藥治之何致於成勞方用人參柴胡陳皮甘草各一錢黃耆白朮各三錢升麻三分水煎服陰虛下陷凡人陰虛脾泄歲久不止或食而不化或化而溏泄方用熟地一兩山藥山萸各五錢茯苓三錢白朮五錢肉桂一錢升麻三分五味子一錢車前子一錢水煎晚服此方純是補陰之藥且有升麻以提陰中之氣又有溫燥之品以暖命門而健脾土何致溏泄哉陰虛火動夜熱晝寒此腎水虛兼感寒或腎水虧竭夜熱晝寒若認作陽症治之則口渴而熱益熾必致消盡陰水吐痰如絮咳嗽不已聲啞聲嘶變成勞瘵法當峻補其陰則陰水足而火焰消骨髓清泰矣方用熟地一兩山萸五錢五味子麥冬各三錢元參一兩地骨皮五錢沙參三錢芡實五錢白芥子三錢桑葉十四片水煎服此方陰虛火動者神效陰寒無火方用肉桂一錢附子三錢熟地一兩白朮人參各三錢柴胡一錢水煎服二方治陰之中即有以治陽治陽之中即藏於補陰過勞凡人過勞脈必大不倫若不安閒作息必有吐血之症法當滋補方用熟地五兩山萸四兩當歸半斛黃耆白芍各五錢人參三兩白朮五兩茯苓三兩砂仁二兩陳皮五錢神麯一兩五味子麥冬各三兩蜜丸早晚滾水送下五錢日重夜輕病重於日間而發寒發熱較夜尤重此症必須從天未明而先截之方用人參一錢黃耆五錢當歸三錢白朮五錢枳殼青皮陳皮各一錢柴胡三錢半夏甘草各一錢乾薑五分水煎服又方熟地一兩人參一錢白朮五錢陳皮甘草各一錢柴胡二錢白芥子一錢水煎服夜重日輕病重於夜間而發寒發熱或寒少熱多或熱少寒多一到大明便覺清爽一到黃昏即覺沉重此陰氣虛甚也方用熟地一兩山萸四錢當歸白芍柴胡各三錢陳皮生何首烏各三錢鱉甲五錢白芥子麥冬各三錢五味子一錢水煎服此方妙在用鱉甲乃至陰之物逢陰則入遇陽則轉生何首烏直入陰經亦攻邪氣白芥子去痰又不耗真陰之氣有不奏功者乎必須將黃昏時服則陰氣固而邪氣不敢人矣陰邪兼陽邪此症亦發於夜間亦發寒發熱無異純陰邪氣之症但少少煩躁耳不若陰症之常靜也法當於補陰之中少加陽藥一二味使陽長陰消自奏功如響矣方用熟地一兩山萸四兩鱉甲五錢當歸三錢人參二錢白朮三錢茯苓五錢柴胡二錢白芥子三錢陳皮一錢麥冬五味子生何首烏各三錢水煎服氣血兩虛飲食不進形容枯槁補其氣血益燥補其血氣益餒助胃氣而盜汗難止補血脈而胸膈阻滯法當氣血同治方用人參白朮川芎各一錢當歸二錢熟地三錢麥冬五錢白芍三錢茯苓二錢甘草八分神麯陳皮各五分穀芽一錢水煎服此治氣血兩補與八珍湯同功而勝於八珍湯者妙在補中有調和之法耳氣虛胃虛人有病久而氣虛者必身體羸弱飲食不進或大便溏泄小便艱澀方用人參一兩白朮五錢茯苓三錢甘草陳皮澤瀉車前子各一錢水煎服此方用人參為君者問其胃氣蓋胃為腎之關關門不開則上之飲食不能進下之糟粕不能化必用人參以養胃土茯苓車前以分消水氣如服此不效兼服八味丸最能實大腸而利膀胱也氣虛飲食不消飲食入胃必須氣充足始能消化而生津液今飲食不消氣虛故方用人參二錢黃耆白朮茯苓各三錢神麯五分甘草三錢麥芽五分山楂三個陳皮五分水煎服傷麵食加萊菔子有痰加半夏白芥子各一錢咳嗽加蘇子一錢桔梗二錢傷風加柴胡二錢夜臥不安加炒棗仁二錢胸中微痛加枳殼五分方內純是開胃之品又恐飲食難消後加消導之品則飲食化而津液生矣血虛面色黃瘦出汗盜汗夜臥常醒不能潤色以養筋是也血虛自當補血舍四物湯又何求耶今不用四物湯方用熟地一兩麥冬三錢桑葉十片枸杞三錢當歸五錢茜草一錢水煎服此方妙在桑葉補陰生血又妙在茜草血得活而益生況又濟之歸地麥杞大劑以共生肺脾雙虧咳嗽不己吐瀉不已此肺脾受傷也人以咳嗽宜治肺吐瀉宜治脾殊不知咳嗽由於脾氣衰斡旋之令不行則上為咳嗽吐瀉由肺氣弱清肅之令不行始上吐而下瀉矣方用人參錢半麥冬茯苓各二錢柴胡神麯薏仁各五分車前子甘草各一錢水煎服此治脾治肺之藥合而用之咳嗽吐瀉之病各愈所謂一方而兩用之也肝腎兩虛腎水虧不能滋肝肝木抑鬱而不舒必有兩脅飽悶之症肝火不能生腎中之火則腎水日寒必有腰背難於俯仰之症此症必須肝腎同補方用熟地一兩山萸當歸白芍各五錢柴胡二錢肉桂一錢水煎服熟地山萸補腎之藥歸芍柴桂補肝之品即云平補似乎用藥不宜有重輕今補肝之藥多於補腎者何蓋腎為肝之母肝又為命門之母豈有木旺而不生命門之火者哉心腎不交腎水臟也心火臟也是心腎二經為仇敵矣似不可牽連而合治之也不知心腎相剋而實相須腎無心之火則水寒心無腎之水則火熾心必得腎水以滋潤腎必得心火以溫暖如人驚惕不安夢遺精泄皆心腎不交之故人以驚惕為心之病我以為腎之病人以夢泄為腎之病我以為心之病非顛倒也實有至理焉細心思之自然明白方用熟地五兩山萸三兩山藥三錢人參三兩白朮五兩芡實五錢茯神三兩菖蒲一兩棗仁炒三兩遠志一兩五味子一兩麥冬三兩柏子仁三兩蜜丸每早晚溫水送下五錢此方之妙治腎之藥少於治心之味蓋心君寧靜腎氣自安何至心動此治腎正所以治心治心即所以治腎也所謂心腎相依精滑夢遺此症人以為腎虛也不獨腎病而心病也宜心腎兼治方用熟地半斛山藥一兩山萸四兩人參三兩白朮四兩茯苓麥冬各三兩肉桂鹿茸各一兩砂仁五錢棗仁炒遠志杜仲各一兩白芍三兩附子一錢柏子仁破故紙各一兩紫河車一副巴戟三兩五味子一兩肉蓯蓉三兩蜜丸早晚白水送下五錢此方用熟地山藥山萸之類補腎也巴戟肉蓯蓉附子鹿茸補腎中之火也可以已矣而又必加入人參茯苓柏子仁麥冬遠志棗仁者何也蓋腎火虛由於心火虛也使補腎火不補心火則反增上焦枯渴欲補腎火則必須補心火則水火相濟也夜夢遺精此症由於腎水耗竭上不能通於心中不能潤於肝當為脾之誤下不能生於肝以致玉關不閉無夢且遺法當補腎而少佐以益心肝脾之品方用熟地一兩山萸四錢白朮五錢茯苓白芍生棗仁當歸薏仁各三錢茯神二錢五味子白芥子一錢肉桂黃連各五分水煎服一劑止十劑不犯遺精健忘遺精下病也健忘上病也何以合治之而咸當乎蓋遺精雖是腎水之虛而實本於君火之弱今補其心君則玉關不必閉而自閉矣所謂一舉而兩得也方用人參一兩蓮鬚二兩芡實三兩熟地五兩山藥四兩五味子一兩麥冬生棗仁各三兩遠志柏子仁各一兩去油菖蒲一兩當歸山萸各三兩蜜丸每日服五錢白水下倒飽中滿氣虛不能食食則倒滿方用人參一錢白朮二錢茯苓三錢陳皮三分甘草一錢山藥三錢芡實五錢薏仁五錢萊菔子一錢水煎服下喉雖則微脹入腹漸覺爽快久虛緩補久虛之人氣息奄奄無不曰宜急治矣不知氣血大虛驟加大補之劑力量難任必致胃口轉膨脹不如緩緩清補之方用當歸一錢白芍二錢茯苓一錢白朮五分人參三分山藥一錢陳皮麥芽炮姜各三錢棗仁五分甘草三分水煎服此方妙在以白芍為君引參苓入肝為佐小小使令徐徐奏功使脾氣漸實胃口漸開然後再用純補之劑先宜緩補之也補氣右手脈大氣分之勞也方用補氣丸人參黃耆各三兩茯苓四兩白朮半斛白芍三兩陳皮一兩炙草八錢五味子一兩麥冬二兩遠志白芥子各一兩蜜丸早晚服五錢白水下補血左手脈大血分之勞也方用補血丸熟地白芍半斛山萸當歸四兩麥冬棗仁白芥子五味子各一兩砂仁肉桂五錢蜜丸晚服一兩白水下如身熱去肉桂加地骨皮五錢出汗人有病不宜汗多若過出汗恐其亡陽不可不用藥以斂之方用人參黃耆當歸各一兩桑葉五片麥冬三錢炒棗仁一錢水煎服癆症癆症既成最難治者必有蟲生之以食人之氣血也若徒補氣血而不入殺蟲之藥則飲食入胃只蔭蟲而不生氣血若但殺蟲而不補氣血則五臟俱受傷又何有生理哉惟於大補之中加殺蟲之藥則元氣既全真陽未散蟲死而身安矣方用人參白薇各三兩熟地地慄粉何首烏桑葉半斛鱉甲山藥一兩神麯麥冬五兩熟地為丸每日白水送下五錢半年蟲從大便出矣痰嗽門古人所主治痰之法皆是治痰之標而不能治其本也如二陳湯上中下久暫之痰皆能治之而其實無實效也今立三方痰症總不出其範圍也初病之痰傷風咳嗽吐痰是也方用陳皮半夏花粉茯苓蘇子甘草各一錢水煎服二劑而痰可消矣此去上焦之痰上焦之痰原在胃中而不在肺去其胃中之痰肺金自然清肅又何至火之上升哉已病之痰必觀其色之白與黃而辨之黃者火已退也白者火正熾也黃白二字當誤正熾者用寒涼之品將退者用祛逐之味今一方而俱治之方用白朮白芥子各三錢茯苓五錢陳皮甘草各一錢枳殼五分水煎服有火加梔子無火不必加此方健脾去濕治痰之在中焦者也又方白朮茯苓薏仁各五錢大花粉二錢陳皮一錢人參五分益智仁三分水煎服有火加黃芩一錢無火加乾薑一錢甘草二分此方健脾去濕而不耗氣二劑而痰自消也久病之痰久病痰多切不可作脾濕生痰論之蓋久病不愈未有不因腎水虧損者也非腎水泛上為疾即腎火沸騰為痰當補腎以祛逐之方用熟地薏仁各一兩山藥麥冬芡實山萸各五錢五味子茯苓各三錢益智仁二錢車前子一錢水煎服此治水泛為痰之聖藥也若火沸騰為痰加肉桂一錢補腎祛濕而化痰水入腎宮自變為真精而不化痰矣此治下焦之痰也又方六味地黃湯加麥冬五味子實有奇功無火加桂附滯痰夫痰之滯乃氣之滯也苟不補氣而惟去其痰未見痰去而病消也方用人參陳皮花粉白芥子各一錢白朮二錢茯苓三錢蘇子八分白蔻二粒水煎服濕痰治痰之法不可徒去其濕必以補氣為先而佐以化痰之品乃克有效方用人參一兩薏仁五錢茯苓半夏神麯各三錢陳皮甘草各一錢水煎服此方之中用神麯人多不識謂神麯乃消食之味非化痰之品不知痰之積聚稠黏甚不易化惟用神麯以發之則積聚稠黏開矣繼之以半夏陳皮可以奏功然雖有陳半消痰使用不多用人參則痰難消今有人參以助氣又有薏仁茯苓健脾去濕而痰焉有不消者乎貝母半夏茯苓各三錢白朮五錢神麯二錢甘草桔梗白礬炙紫苑各一錢水煎服此方前六味誤入頑痰項下今移此此方妙在貝母半夏同用一燥一濕使痰無處逃避又有白礬消塊梗菀去邪甘草調中有不奏功者乎水泛為痰腎中之水有火則安無火則泛倘人過於入房則水去而火亦去久之則水虛而火亦虛水無可藏之地必泛上為痰矣治之法欲抑水之下降必先使水之下溫當於補腎之中加大熱之藥使水足以制火火足以暖水則水火有既濟之道自不上泛為痰矣方用熟地一兩山萸五錢肉桂二錢牛膝三錢五味子一錢水煎服一劑而痰下行矣二劑而痰自消矣中氣又中痰中氣中痰雖若中之異而實中於氣之虛也氣虛自然多痰痰多必然耗氣雖分實合也方用原本無方寒痰人有氣虛而痰寒者即用前方加肉桂三錢乾薑五分足之矣熱痰人有氣虛而痰熱者方用當歸三錢白芍二錢麥冬茯苓各二錢陳皮甘草花粉白芥各一錢神麯三分水煎服老痰凡痰在胸膈而不化者謂之老痰方用柴胡茯苓甘草陳皮丹皮花粉各一錢白芍薏仁各三錢白芥子五錢水煎服此方妙在白芥子為君薏仁白芍為臣柴胡花粉為佐使老痰無處可藏十劑而老痰可化矣頑痰痰成而塞咽喉者謂之頑痰方用人參一兩半夏南星茯苓各三錢附子一錢甘草一兩水煎服人參原是氣分之神劑而亦消痰之妙藥半夏南星雖逐痰之妙品而亦扶氣之正藥附子甘草一仁一勇相濟而成濕嗽秋傷於濕若用烏梅粟殼等味斷乎不效方用白朮三錢陳皮當歸甘草枳殼桔梗各一錢水煎服三劑然矣冬嗽皆秋傷於濕也豈可拘於受寒乎久嗽方用人參五錢白芍棗仁各三錢五味子白芥子各一錢益智仁五分水煎服久嗽方用烏梅瓜蔞仁五錢去油杏仁一錢硼砂一錢人參童便浸五味子五錢酒蒸寒水石一錢火煅胡桃仁一錢去油薄荷五分甘草五分貝母三兩蜜丸櫻桃大淨綿包之口中噙化虛勞未曾失血脈未數者皆用之無論老少神效十粒見功二十粒愈又方用人參當歸細辛各一錢水煎連渣嚼盡一二劑即愈肺嗽兼補腎肺嗽之症本是肺虛其補腎當為肺也明矣奈何兼補腎乎肺經之氣夜必歸於腎若肺金為心火所傷必求救於其子子若力量不足將何以救其母哉方用熟地麥冬各一兩山萸四錢元參五錢蘇子牛膝各一錢沙參天冬各二錢紫菀五分水煎服
