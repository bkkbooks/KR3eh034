body:
  text: 男科卷三癲狂門癲狂此症多生於脾胃之虛寒飲食入胃不變精而變痰痰迷心竅遂成癲狂苟徒治痰而不補氣未有不死者也方用人參白芥子各五錢白朮一兩半夏三錢陳皮乾薑肉桂各一錢甘草菖蒲各五分水煎服如女人得此症去肉桂加白芍柴胡黑梔治之亦神效發狂見鬼此症氣虛而中痰也宜固其正氣而佐以化痰之品方用人參白朮各一兩半夏南星各三錢附子一錢水煎服發狂不見鬼此症是內熱之症方用人參白芍半夏各三錢南星黃連各二錢陳皮甘草白芥子各一錢水煎服狂症此症有因熱得之者一時之狂也可用白虎湯以瀉火更有終年狂而不愈者或拿刀殺人或罵親戚不認兒女見水大喜見食大惡此乃心氣之虛而熱邪乘之痰氣侵之也方用化狂湯人參白朮茯神各一兩附子一分半夏菟絲子各三錢菖蒲甘草各一錢水煎服一劑狂定此方妙在補心脾胃三經而化其痰不去瀉火蓋瀉火則心氣益傷而痰涎益盛狂何以止乎尤妙微用附子引補心消痰之品直入心中則氣易補而痰易消又何用瀉火之多事哉寒狂凡發狂罵人未渴索飲予水不飲者寒症之狂也此必氣鬱不舒怒氣未泄其人必性情過於柔弱不能自振者耳宜補氣消痰方用人參茯苓各一兩白朮五錢半夏南星附子柴胡各一錢菖蒲三分水煎服藥下喉睡熟醒來病如失矣怔忡驚悸門怔忡不寐此症心經血虛也方用人參當歸茯神麥冬各三錢丹皮二錢甘草菖蒲五味子各一錢生棗仁熟棗仁各五錢水煎服此方妙在用生熟棗仁生使其日間不臥熟使其夜間不醒又以補心之藥為佐而怔忡安矣心驚不安夜臥不唾此心病而實腎病也宜心腎兼治方用人參茯苓茯神熟地麥冬各三兩遠志生棗仁白芥子各一兩砂仁肉桂黃連各五錢山萸當歸各三兩菖蒲三錢蜜丸每日下五錢湯酒俱可此方治心驚不安與不寐耳用人參當歸茯神麥冬足矣即為起火不寐亦不過用黃連足矣何以反用熟地山萸補腎之藥又加肉桂以助火不知人之心驚乃腎氣不入於心也不寐乃心氣不歸於腎也今用熟地山萸補腎則腎氣可通於心肉桂以補命門之火則腎氣既溫相火有權君火相得自然上下同心君臣合德矣然補腎固是而亦有肝氣不上於心而成此症者如果有之宜再加白芍二兩兼補肝木斯心泰然矣恐怕人夜臥交睫則夢爭鬥負敗恐怕之狀難以形容人以為心病誰知是肝病乎蓋肝藏魂肝血虛則魂失養故交睫若魘此乃肝膽虛怯故負恐維多此非大補不克奏功而草木之品不堪任重當以酒化鹿角膠大補精血血旺則神自安矣神氣不安人有每臥則魂飛揚覺身在床而魂離體矣驚悸多魘通夕不寐人皆以為心病也誰知是肝經受邪乎蓋肝氣一虛邪氣襲之肝藏魂肝中邪魂無依是以魂飛揚而若離體也法用珍珠母為君龍齒佐之珍珠母入肝為第一龍齒與肝同類龍齒虎睛今人例以為鎮心之藥詎知龍齒安魂虎睛定魄東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守是以治魄不寧宜虎睛治魂飛揚宜龍齒藥各有當也腰腿肩臂手足疼痛門滿身皆痛手足心腹一身皆痛將治手乎治足乎治肝為主蓋肝氣一舒諸痛自愈不可頭痛救頭足痛救足也方用柴胡甘草陳皮梔子各一錢白芍薏仁茯苓各五錢當歸蒼朮各二錢水煎服此逍遙散之變化也舒肝而又去濕去火治一經而諸經無不愈也腰痛痛而不能俯者濕氣也方用柴胡澤瀉豬苓白芥子各一錢防己二錢肉桂山藥各三錢白朮甘草各五錢水煎服此方妙在入腎去濕不是入腎而補水初痛者一二劑可以奏功日久必多服為妙腰痛痛而不能直者風寒也方用逍遙散加防己二錢一劑可愈若日久者當加杜仲一兩改白朮二錢酒煎服十劑而愈又方杜仲鹽炒一兩破故紙鹽炒五錢熟地白朮各三兩核桃仁二錢蜜丸每日空心白水送下五錢服完可愈如未痊愈再服一料可愈腰痛凡痛而不止者腎經之病乃脾濕之故方用白朮四兩薏仁三兩芡實二兩水六杯煎一杯一氣飲之此方治夢遺之病亦神效腰腿筋骨痛方用養血湯當歸生地肉桂牛膝杜仲各一錢川芎五分甘草三分山萸土茯苓各二錢核桃二個破故紙茯苓防風各一錢水酒煎服腰痛足亦痛方用黃耆半斤防風茯苓各五錢薏仁五兩杜仲一兩車前子三錢肉桂一錢水十碗煎二碗入酒以醉為主即愈腰足痛明系是腎虛而氣衰更加之濕自必作楚妙在不補腎而單益氣蓋氣足則血生血生則邪退又助之薏仁茯苓車前之類去濕濕去而血活矣況又有杜仲之健腎肉桂之溫腎防風之盪風乎腿痛身不離床褥傴僂之狀可掬乃寒濕之氣侵也方用白朮五錢芡實二錢茯苓萆薢各一兩肉桂一錢杜仲三錢薏仁二兩水煎日日服之不必改方久之自奏大功兩臂肩膊痛此手經之病肝氣之郁也方用當歸白芍各三兩柴胡陳皮各五錢羌活白芥子半夏秦艽各三錢附子一錢水六杯煎三沸取汁一杯入黃酒服之一醉而愈此方妙在用白芍為君以平肝木不來侮胃而羌活柴胡又去風直走手經之上秦艽亦是風藥而兼附子攻邪邪自退出半夏陳皮白芥子祛痰聖藥風邪去而痰不留更得附子無經不達而其痛如失也手足痛手足肝之分野而人乃為脾經之熱不知散肝木之鬱結而手足之痛自去方用逍遙散加梔子三錢半夏白芥子各二錢水煎服二劑其痛如失蓋肝木作祟脾不敢當其鋒氣散於四肢結而不伸所以作楚平其肝氣則脾氣自舒矣胸背手足頸項腰膝痛筋骨牽引坐臥不得時時走易不定此是痰涎伏在心膈上下或令人頭痛夜間喉中如鋸聲口流涎唾手足重腿冷治法用控涎丹不足十劑其病如失矣背骨痛此症乃腎水衰耗不能上潤於腦則河車之路乾澀而難行故作痛也方用黃耆熟地各一兩山萸四錢白朮防風各五錢五味子一錢茯苓三錢附子一分麥冬二錢水煎服此方補氣補水去濕去風潤筋滋骨何痛之不愈哉腰痛兼頭痛上下相殊也如何治之乎治腰乎治頭乎誰知是腎氣不通乎蓋腎氣上通於脈而腦氣下達於腎上下雖殊而氣實相通法當用溫補之藥以大益其腎中之陰則上下之氣通矣方用熟地一兩杜仲麥冬各五錢五味子二錢水煎服一劑即愈方內熟地杜仲腎中之藥也腰痛是其專功今並頭而亦愈者何也蓋頭痛是腎氣不上達之故腎補腎之味則腎氣旺而上通於腦故腰不痛而頭亦不痛矣心腹痛門心痛辨心痛之症有二一則寒氣侵心而痛一則火氣侵心而痛寒氣侵心者手足反溫火氣焚心者手足反冷以此辨之最得寒痛方用良薑白朮草烏貫仲各三錢甘草肉桂各一錢水煎服熱痛方用黑梔三錢白朮五錢甘草半夏柴胡各一錢水煎服心不可使痛或寒或火皆衝心包耳按據大小諸證方論此方白朮五錢應為白芍二兩久病心痛心乃神明之君一毫邪氣不可干犯犯則立死經年累月而痛者邪氣犯心包絡也但邪有寒熱之辨如惡寒見水如仇火熨之則快此寒邪也方用蒼朮二錢白朮五錢當歸一錢肉桂良薑各一錢水煎服久病心痛如熱邪犯包絡見火喜悅手按之而轉痛者熱氣犯心包絡也方用白芍一兩黑梔當歸生地各三錢陳皮八分水煎服原方有甘草一錢寒熱二症皆責之於肝也肝屬木心屬火木衰不能生火則包絡寒補肝而邪自退若包絡之熱由於肝經之熱瀉肝而火自消矣腹痛痛不可忍按之愈痛口渴飲以涼水則痛少止少頃依然大痛此火結在大小腸也若不急治一時氣絕方用定痛如神湯黑梔蒼朮各三錢甘草厚朴各一錢茯苓一兩白芍五錢水煎服此方舒肝經之氣利膀胱之水瀉水逐瘀再加大黃一錢水煎服勿遲腹痛腸中有痞塊一時發作而痛不可不按者方用白朮二兩枳實一兩馬糞炒黑五錢好酒煎服冷氣心腹痛方用火龍丹硫磺醋製一兩胡椒一錢白礬四錢醋打蕎麵為丸如桐子大每服二十五丸米湯下胃氣痛人病不能飲食或食而不化作痛作滿或兼吐瀉此肝木克脾土也方用白芍當歸柴胡茯苓各二錢甘草白芥子各一錢白朮三錢水煎服有火加梔子二錢無火加肉桂一錢有食加山楂三錢傷麵食加枳殼一錢麥冬一錢有痰加半夏一錢有火能散有寒能驅此右病而左治之也麻木門手麻木此乃氣虛而寒濕中之如其不治三年後必中大風方用白朮黃耆各五錢陳皮桂枝各五分甘草一兩手麻十指皆麻面目失色此亦氣虛也治當補中益氣湯加木香麥冬香附羌活烏藥防風三劑可愈手足麻木四物湯加人參白朮茯苓陳皮半夏桂枝柴胡羌活防風秦艽牛膝炙草薑棗引煎服四劑愈木凡木是濕痰死血也用四物湯加陳皮半夏茯苓桃仁紅花白芥子甘草竹瀝薑汁水煎服腿麻木方用導氣散黃耆二錢甘草錢半青皮一錢升麻柴胡歸尾澤瀉各五分陳皮八分紅花少許水煎溫服甚效兩手麻木困倦嗜臥此乃熱傷元氣也方用益氣湯人參甘草各一錢黃耆二錢炙草五分柴胡白芍各七分五味子三十粒姜三片棗二枚水煎熱服渾身麻木凡人身體麻木不仁兩目羞明怕日眼澀難開視物昏花睛痛方用神效黃耆湯黃耆白芍各一錢陳皮五錢人參八分炙草四分蔓荊子二分如有熱加黃柏三分水煎服麻木痛風寒濕三氣合而成疾客於皮膚肌肉之間或痛或麻木方用牛膝膠二兩南星五錢薑汁半碗共熬膏攤貼再以熱鞋底熨之加羌活乳香沒藥更妙足弱此症不能步履人以為腎水之虛誰知由於氣虛而不能運動乎方用補中益氣湯加牛膝人參各三錢金石斛五錢黃耆一兩水煎服筋縮凡人一身筋脈不可有病病則筋縮而身痛脈澀而體重夫然筋之舒在於血和而脈之平在於氣足故治筋必先須治血而治脈必先須補氣人若筋急攣縮傴僂而不能直立者皆筋病也方用當歸一兩白芍薏仁生地元參各五錢柴胡一錢水煎服此方妙在用柴胡一味入於補藥之中蓋血虧則筋病用補藥以治筋宜矣何又用柴胡夫肝為筋之主筋乃肝之餘氣不順筋自縮急今用柴胡以舒散之鬱氣既除而又濟之以大劑補血則筋得其養矣脅痛門兩脅有塊左脅有塊作痛是血死也右脅有塊作痛是食積也遍身作痛筋骨尤甚不能伸屈口渴目赤頭眩痰壅胸不利小便短赤夜間殊甚又遍身作癢如蟲行人以為風也誰知是腎氣虛而熱也法用六味地黃湯加梔子柴胡乃是正治也三劑見效左脅痛左脅痛肝經受邪也方用黃連吳茱萸炒二錢柴胡當歸青皮桃仁研各一錢川芎八分紅花五分水煎食遠服有痰加陳皮半夏右脅痛此是邪入肺經也方用片薑黃枳殼各二錢桂心二分炙草陳皮半夏各五分水煎服左右脅俱痛方用柴胡川芎青皮枳殼香附龍膽草當歸砂仁甘草木香姜水煎服兩脅走注兩脅走注痛而有聲者痰也方用二陳湯去甘草加枳殼砂仁廣木香川芎青皮蒼朮香附茴香水煎服脅痛身熱此勞也用補中益氣湯加川芎白芍青皮砂仁枳殼茴香去黃耆水煎服脅痛此乃肝病也故治脅痛必須平肝平肝必須補腎腎水足而後肝氣有養不治脅痛而脅痛自平也方用肝腎兼資湯熟地當歸各一兩白芍二兩黑梔一錢山萸五錢白芥子甘草各三錢水煎服脅痛咳嗽咳嗽氣急脈滑數者痰結痛也方用瓜蔞仁枳殼青皮茴香白芥子水煎服濁淋門附腎病二濁五淋辨濁淋二症俱小便赤也濁多虛淋多實淋痛濁不痛為異耳濁淋俱屬熱症惟其不痛大約屬濕痰下陷及脫精所致惟其有痛大約縱淫欲火動強留敗精而然不可混治淋症方用五淋散淡竹葉二錢赤茯苓芥穗各一錢車前子五錢燈心一錢水煎服濁症方用清心蓮子飲石蓮子人參各二錢半炙草二錢麥冬黃耆地骨皮車前子各一錢半甘草五分赤茯苓二錢水煎服腎病門陽強不倒此虛火炎上而肺氣不能下行故耳若用黃柏知母煎湯飲之立時消散然自倒之後終年不能振起亦非善治之法也方用元參麥冬各三兩肉桂三分水煎服此方妙在用元參以瀉腎中之火肉桂入其宅麥冬助肺金之氣清肅下行以生腎水水足則火自息矣不求倒而自倒矣陽痿不舉此症乃平日過於琢削日泄其腎中之水而腎中之火亦因之而消亡蓋水去而火亦去必然之理有如一家人口廚下無水何以為炊必有水而後取柴炭以煮飯不則空鐺也方用熟地一兩山萸四錢遠志巴戟肉蓯蓉杜仲各一錢肉桂茯神各一錢人參三錢白朮五錢水煎服尿血又便血便血出於後陰尿血出於前陰最難調治然總之出血於下也方用生地一兩地榆三錢水煎服二症俱愈蓋大小便各有經絡而其症皆因膀胱之熱也生地地榆俱能清膀胱之熱一方而兩用之也蓋分之中有合疝氣方用去鈴丸大茴香薑汁各一斤將茴香入薑汁內浸一宿入青鹽二兩同炒紅為末酒丸桐子大每服三十丸溫酒米湯送下腎子痛方用用生草三兩加羊血半碗和勻飲之立吐而愈若不吐速用大黃二兩甘草五錢白礬一兩當歸三兩水煎數碗飲之立時大瀉即生補腎方用大青鹽寂葦七寸煮核桃嚏噴法方用生半夏為末水丸綠豆大入鼻孔必嚏噴不已用水飲之立止通治中風不語及中惡中鬼俱妙破傷風方用蟬蛻去淨頭足為末五錢用好酒一碗煎滾入末調勻服之立生又方生麻油頭髮馬尾羅底羊糞蛋各等分共為末黃酒沖服瘋狗咬傷方用手指甲焙黃為末滾黃酒沖服發汗即愈忌床事百日
