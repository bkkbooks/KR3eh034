body:
  text: 男科卷二喘症門氣治法氣虛氣實不可不平之也氣實者非氣實乃正氣虛而邪氣實也法當用補正之藥而加祛逐之品則正氣足邪氣消矣方用人參白朮麻黃半夏甘草各一錢白芍三錢柴胡二錢水煎服推而廣之治氣非一條也氣陷補中益氣湯可用氣衰六君子湯可採氣寒人參白朮附子湯可施氣虛則用四君子湯氣鬱則用歸脾湯氣熱用生脈散氣喘用獨參湯氣動用二陳湯加人參氣壅塞用射干湯氣逆用逍遙散氣虛則贏弱氣實則旺甚氣虛用前方氣實另一方白朮柴胡甘草梔子各一錢茯苓三錢白芍二錢陳皮枳殼各五分山楂十個水煎服氣喘凡人氣喘而上者人以為氣有餘也殊不知氣盛當作氣虛看有餘當作不足看若認作肺氣之盛而用蘇葉桔梗百部豆根之類去生遠矣方用人參三兩牛膝三錢熟地五錢山萸四錢枸杞五味子各一錢麥冬五錢胡桃三個生薑五片水煎服此方不治肺而正所以治肺也或疑人參乃健脾之藥既宜補腎不宜多用人參不知腎水大虛一時不能遽生非急補其氣則元陽一線必且斷絕況人參少用則泛上多用即下行妙在用人參三兩使下達病源補氣以生腎水方中熟地山萸之類同氣相求直入命門又何患其多哉若病重之人尤宜多加但喘有初起之喘有久病之喘初起之喘多實邪久病之喘多氣虛實邪喘者必抬肩氣虛喘者微微氣息耳此方治久病之喘若初起之喘四磨四七湯一劑即止喘不獨肺氣虛而腎水竭也實喘黃芩二錢柴胡甘草各五分麥冬三錢蘇葉烏藥半夏山豆根各一錢水煎服一劑喘定不定再劑也凡實喘症氣大急喉中必作聲肩必抬似重而實輕也虛喘大抵此等症氣少息喉無聲肩不抬也乃腎氣大虛脾氣又復將絕故奔沖而上欲絕未絕也方用救絕湯人參熟地各一兩山萸三錢牛膝五味子白芥子各一錢麥冬五錢水煎服氣短似喘氣短似喘而實非喘也若作實喘治之立死蓋氣短乃腎氣虛耗氣衝上焦壅塞於肺經不足之症也方用人參二兩熟地一兩山萸牛膝補骨脂枸杞各三錢麥冬五錢胡桃三個去皮五味子二錢水煎服三劑氣平喘定此方妙在用人參之多能下達氣原挽回於無何有之鄉又純是補肺補腎之品子母相生水氣自旺則火氣自安於故宅不上衝於喉門矣抬肩大喘人忽感風邪寒入於肺以致喘急肩抬氣逆痰吐不出身不能臥方用柴胡茯苓當歸麥冬桔梗各二錢黃芩甘草半夏射干各一錢水煎服此方妙在用柴胡射干桔梗以發舒肺金之氣半夏以祛痰黃芩以祛火蓋感寒邪內必變為熱症故用黃芩以清解之然徒用黃芩雖曰清火轉足以遏抑其火而火未必伏也有射干桔梗柴胡一派辛散之品則足以消火減邪矣腎寒氣喘人有氣喘不能臥吐痰如湧泉者舌不燥而喘不止一臥即喘此非外感之寒邪乃腎中之寒氣也蓋腎中無火則水無所養乃泛上而為痰方用六味地黃湯加桂附大劑飲之蓋人之臥必腎氣與肺氣相安而後河車之路平安而無奔越也腎火扶肝上衝凡人腎火逆扶肝氣而上衝以致作喘甚有吐紅粉痰者此又腎火炎上以燒肺金肺熱不能克肝而龍雷之火併騰矣方用沙參地骨皮各一兩麥冬五錢丹皮三錢白芍五錢白芥子二錢桔梗五分甘草三分水煎服此方妙在地骨皮清骨中之火沙參丹皮以養陰白芍平肝麥冬清肺甘草桔梗引入肺經則痰消而喘定矣假熱氣喘吐痰人有假熱氣喘吐痰者人以為熱而非熱也乃下元寒極逼其火而上喘也此最危急之症苟不急補其腎水與命門之火則一線之微必然斷絕方用熟地四兩山藥麥冬各三兩五味子牛膝各一兩肉桂附子各一錢水煎冷服一劑而愈喘嗽人有喘而且嗽者人以為氣虛而有風痰也誰知是氣虛不能歸源於腎而肝木挾之作祟乎法當峻補其腎少助以引火之品則氣自歸源於腎而喘嗽俱止矣方用人參一兩熟地二兩麥冬五錢牛膝枸杞白朮五味子菟絲子各一錢茯苓三錢水煎服連服幾劑必有大功倘以四磨四七湯治之則不效矣即投貞元飲此方專治喘而脈微澀者熟地三兩當歸七錢甘草一錢水煎服婦人多此症吐血門陽症吐血人有感暑傷氣忽然吐血盈盆人以為陰虛也不知陰虛吐血與陽虛不同陰虛吐血人安靜無躁動陽虛必大熱作渴欲飲冷水舌必有刺陰虛口不渴而舌苔滑也法當清胃火不必止血也方用人參當歸香薷石膏各三錢荊芥一錢青蒿五錢水煎服此方乃陽症吐血之神劑也方中雖有解暑之味然補正多於解暑去香薷一味實可同治但此方只可用一二劑即改六味地黃湯大怒吐血其血也或傾盆而出或沖口而來一時昏暈死在頃刻以止血治之則氣悶不安以補血治之則胸滿不受有變症蜂起而死者不可不治之得法也方用解血平氣散方用白芍當歸各二兩炒荊芥黑山梔各三錢紅花二錢柴胡八分甘草一錢水煎服一劑而氣平舒二劑而血止息三劑而症大愈此症蓋怒傷肝不能平其氣以致吐血若不先舒其氣而遽止血則愈激動肝火之氣必氣愈旺而血愈吐矣方中用白芍平肝又舒氣柴胡荊芥引血歸經當歸紅花生新去舊安有不愈者哉吐血此症人非以為火盛即以為陰虧用涼藥以瀉火乃火愈盛而血愈多用滋陰之味止血之品仍不效誰知是血不歸經乎治法當用補氣之藥而佐以引血歸經之味不止血而血自止矣方用人參五錢當歸一兩炒丹皮黑芥穗各三錢水煎服一劑而止此方妙在不專補血而反去補氣以補血尤妙在不去止血而去行血以止血蓋血逢寒則凝逢散則歸經救死於呼吸之際大有神功吐白血血未有不紅者何以名白血不知久病之人吐痰皆白沫乃白血也白沫何以名白血以其狀似蟹涎無敗痰存其中實血而非痰也若將所吐白沫露於星光之下一夜必變紅矣此沫出於腎而腎火沸騰於咽喉不得不吐者也雖是白沫而實腎中之精豈特血而已哉苟不速治則白沫變為綠痰無可如何矣方用熟地麥冬各一兩山藥山萸茯苓各五錢丹皮澤瀉各二錢五味子一錢水煎服日日服之血不歸經凡人血不歸經或上或下或四肢毛竅各處出血循行經絡外行於皮毛中行於臟腑內行於筋骨上行於頭目兩手下行於二便一臍周身無非血路一不歸經則各處妄行有孔則鑽有洞則泄甚則嘔吐或見於皮毛或出於齒縫或滲於臍腹或露於二便皆宜順其性以引之歸經方用熟地生地各五錢當歸白芍麥冬各三錢茜草根荊芥川芎甘草各一錢水煎服此方即四物湯加減妙在用茜草引血歸經三黑神奇飲丹皮炒黑七分黑山梔五分真蒲黃炒黑一錢二分貝母一錢川芎酒洗生地酒洗各一錢水二杯童便藕汁各半杯煎服此方治吐血神效無比二劑止六味地黃湯加麥冬五味子最能補腎滋肝木得其養則血有可藏之經而不外泄血症最宜服之嘔吐門脾胃症辨人有能食而不能化者乃胃不病而脾病也當補脾而補脾尤宜補腎中之火蓋腎火能生脾土也不能食食之而安然者乃脾不病而胃病也不可補腎中之火當補心火蓋心火能生胃土也世人一見不飲食動曰脾胃虛也殊不知胃之虛寒責之心脾之虛寒責之腎不可不辨也反胃大吐大吐之症舌有芒刺雙目紅腫人以為熱也誰知是腎水之虧乎蓋脾胃必借腎水而滋潤腎水之虧則脾胃之火沸騰而上以致目紅腫而舌芒刺也但此症時躁時靜時欲飲水及水到又不欲飲即強之飲亦不甚快此乃上假熱而下真寒也宜六味地黃湯加桂附水煎服外治法先以手擦其足心使之極熱然後用附子一個煎湯用鵝翎掃之隨干隨掃少頃即不吐矣後以六味地黃湯大劑飲之即安然也或逍遙散加黃連亦立止也無如世醫以雜藥投之而成噎嗝矣方用熟地三兩山萸元參各一兩當歸五錢牛膝白芥子各三錢五味子二錢水煎服蓋腎水不足則大腸必干而細飲食入胃難於下行故反而上吐矣寒邪犯腎大吐寒入腎宮將脾胃之水挾之盡出手足厥逆小腹痛不可忍以熱物熨之少快否則寒冷難支人多以為胃病其實腎病也方用附子一個白朮四兩肉桂一錢乾薑三錢人參三兩水煎服此藥下喉便覺吐定煎渣再服安然如故嘔吐世人皆以嘔吐為胃虛誰知由於腎虛乎故治吐不效未窺見病之根也方用人參芡實各三錢白朮薏仁各五錢砂仁五粒吳萸五分水煎服火吐此症若降火則火由脾而入於大腸必變為便血之症法宜清火止吐方用茯苓一兩人參二錢砂仁三粒黃連三錢水煎服寒吐此症若降寒則又引入腎而流於膀胱必變為遺尿之症法宜散寒止吐方用白朮二兩人參五錢附子乾薑各一錢丁香五分水煎服此方散寒而用補脾之品則寒不能上越而亦不得下行勢不能不從臍出也胃吐此症由於脾虛脾氣不得下行自必上反而吐補脾則胃安方用人參茯苓各三錢白朮五錢甘草肉桂神麯半夏各一錢砂仁三粒水煎服此方治胃病以補脾者何也蓋胃為脾之關關門之沸騰由於關中之潰亂欲使關外之安靜必先使關中之安寧況用砂仁半夏神麯等味全是止吐之品有不奏功者乎此脾胃兩補之反胃人有食入而即出者乃腎水虛不能潤喉故喉燥而即出也方用熟地二兩山萸茯苓麥冬各五錢山藥一兩澤瀉丹皮各三錢五味子一錢水煎服反胃此症又有食久而反出者乃腎火虛不能溫脾故脾寒而反出也方用熟地二兩山萸一兩山藥六錢茯苓丹皮附於肉桂各三錢澤瀉二錢水煎服胃寒心腎兼補治脾胃兩虛者固效若單胃之虛寒自宜獨治心之為妙方用人參遠志各一兩白朮茯苓蓮子白芍各三兩菖蒲良薑棗仁各五錢半夏附子白芥子山藥各四錢蜜丸每日白水送下五錢胃寒吐瀉心寒胃弱此症由於心寒胃弱嘔吐不已食久而出是也下痢不己五更時痛瀉三五次者是也人以為脾胃之寒服脾胃之藥而不效者何也蓋胃為腎之關而脾為腎之海胃氣弱不補命門之火則心包寒甚何以生胃土而消穀食脾氣弱不補命門之火則下焦虛冷何以化飲食而生精華故補脾胃莫急於補腎也方用熟地茯苓人參各三兩山萸二兩山藥四兩附子肉桂五味子各一兩吳萸五錢蜜丸每日白水送下五錢空心臌症門水臌此症滿身皆水按之如泥者是若不急治水流四肢不得從膀胱出則為死症矣方用決流湯黑醜甘遂各二錢肉桂三分車前子一兩水煎服一劑水流鬥余二劑全愈斷勿與三劑也與三劑反殺之矣蓋二醜甘遂最善利水又加肉桂車前子引水以入膀胱利水而不走氣不使牛遂牽牛即二醜甘遂之過猛也二劑之後須改五苓散調理二劑再用六君子湯補脾可也忌食鹽犯之必不救矣氣臌此症氣虛作腫似水而實非水也但按之不如泥耳必先從腳面上腫起後漸腫至身上於是頭面皆腫者有之此之謂之氣臌宜於健脾行氣之中加引水之品若以治水臌法治之是速之死也方用白朮茯苓薏仁各一兩甘草肉桂各一分枳殼五分人參蘿蔔子神麯車前子各一錢山藥五錢水煎服初服若覺有礙久之自有大功三十劑而愈矣亦忌食鹽秋石亦忌蟲臌此症小腹痛四肢浮腫而未甚面色紅而有白點如蟲食之狀是謂之蟲臌方用消蟲神奇丹當歸鱉甲地慄粉各一兩雷丸神麯茯苓白礬各三錢車前子五錢水煎服一劑下蟲無數二劑蟲盡臌消不必三劑但病好必用六君子湯去甘草調理血臌此症或因跌閃而瘀血不散或憂鬱而結血不行或風邪而蓄血不散留在腹中致成血臌飲食入胃不變精血反去助邪久則腹脹成臌矣倘以治水法逐之而症非水徒傷元氣以治氣法治之而又非氣徒增飽滿方用逐瘀湯水蛭三錢此物最難死火燒經年入水猶生必須炒黃為末方妥當歸二兩雷丸紅花枳殼白芍牛膝各三錢桃仁四十粒水煎服一劑血盡而愈切勿與二劑當改四物湯調理於補血內加白朮茯苓人參補元氣而利水自然全愈不則恐成乾枯之症辨血臌惟腹脹如臌而四肢手足並無臌意也水症門水腫此症土不能剋水也方用牽牛甘遂各二錢水煎服此症治法雖多獨此方奇妙其次雞屎醴亦效雞屎醴治血臌尤效呃逆此症乃水氣凌心包也心包為水氣所凌呃逆不止號召五臟之氣救水氣之犯心也治法當利濕分水方用茯神薏仁各一兩芡實丁香各五錢蒼朮白朮人參各三錢法制半夏陳皮各一錢吳萸三分水煎服二劑愈水結膀胱此症目突口張足腫氣喘人以為不治之症不知膀胱與腎相為表裡膀胱之開合腎司其權特通其腎氣而膀胱自通矣方用通腎消水湯熟地山藥薏仁各一兩山萸錢半茯神五錢肉桂牛膝各一錢車前子三錢水煎服濕症門黃症此症外感之濕易治內傷之濕難療外感者利水則愈若內傷之濕瀉水則氣消發汗則精泄必健脾行氣而後可也方用白朮茯苓薏仁各一兩茵陳黑梔各三錢陳皮五分水煎服此方治內傷之濕不治外感之濕若欲多服去梔子癉症此症雖因風寒濕而來亦因元氣之虛邪始得乘虛而人倘攻邪而不補正則難愈矣今於補正之中佐以去風寒濕之品而癉如失矣方用白朮五錢人參三錢茯苓一兩柴胡附子半夏各一錢陳皮五分水煎服傷濕此症惡濕身重足腫小便短赤方用澤瀉豬苓各三錢肉桂五分茯苓白朮各五錢柴胡半夏車前子各一錢水煎服一劑愈腳氣今人以五苓散去濕亦是正理然不升其氣而濕未必盡去也必須提氣而水乃散也方用黃耆一兩人參白朮各三錢防風肉桂柴胡各一錢薏仁芡實白芍各五錢半夏二錢陳皮五分水煎服此方去濕之聖藥防風用於黃耆之中已足提氣而去濕又助之柴胡舒氣氣自升騰氣升則水散白朮茯苓薏仁芡實俱是去濕之品有不神效者乎泄瀉門瀉甚一日五六十回傾腸而出完穀不化糞門腫痛如火之熱茗無以救之必致立亡方用截瀉湯薏仁白芍各二兩山藥車前子各一兩黃連茯苓各五錢澤瀉甘草各二錢人參三錢肉桂三分水煎服水瀉白朮一兩車前子五錢水煎服此方補腎健脾利水去濕治瀉神效火瀉完穀不化飲食下喉即出日夜數十次甚至百次人皆知其熱也然而熱之生也何故生於胃中之水衰不能制火使胃土關門不守於上下所以直進而直出也論其勢之急迫似乎宜冶其標然治其標而不能使火之驟降必須急補腎中之水使火有可居之地而後不致上騰也方用熟地白芍各三錢山萸茯苓甘草車前子各一兩肉桂三分水煎服此乃補腎之藥非止瀉之品然而止瀉之妙捷如桴鼓世人安知此也水瀉此乃純是下清水非言下痢也痢無止法豈瀉水亦無止法乎故人患水瀉者急宜止遏方用白朮五錢茯苓三錢吳萸五分車前子五味子各一錢水煎服泄瀉吞酸泄瀉寒也吞酸火也似乎寒熱殊而治法異矣不知吞酸雖熱由於肝氣之鬱結泄瀉雖寒由於肝木之克脾苟用一方以治木鬱又一方以培脾土土必大崩木必大調矣不若一方而兩治之為愈也方用白芍五錢柴胡車前子各一錢茯苓三錢陳皮甘草神麯各五分水煎服此方妙在白芍以舒肝木之郁木鬱一舒上不克胃下不克脾又有茯苓車前以分消水濕之氣則水盡從小便出而有餘之水以吞酸刺汁以泄瀉哉痢疾門火邪內傷辨火邪之血色必鮮紅脈必洪緩口必渴而飲冷水小便必澀而赤濁內傷之血色不鮮而紫暗或微紅淡白脈必細而遲或浮澀而空口不渴即渴而喜飲熱湯小便不赤不澀即赤而不熱不濁此訣也痢疾此症感濕熱而成紅白相見如膿如血至危至急者也苟用涼藥止血熱藥攻邪俱非善治之法方用白芍當歸各二兩枳殼檳榔各二錢滑石三錢廣木香萊菔子甘草各一錢水煎服一二劑收功此方妙在用歸芍至二兩之多則肝血有餘不去克脾土自然大腸有傳送之功加之枳殼檳榔俱逐穢去積之品尤能於補中用攻而滑石甘草木香調達於遲速之間不疾不徐使瘀滯盡下也其餘些小痢疾減半用之無不奏功此方不論紅白痢疾痛與不痛服之皆神效又方當歸一兩黃芩酒洗七分蒼朮厚朴大腹皮陳皮各一錢水二碗煎一碗頓服血痢凡血痢腹痛者火也方用歸尾白芍各一兩黃連三錢枳殼木香萊菔子各二錢水煎服寒痢凡痢腹不痛者寒也方用白芍當歸各三錢枳殼檳榔甘草萊菔子各一錢水煎服前方治壯實之人火邪挾濕者此方治寒痢腹不痛者更有內傷勞倦與中氣虛寒之人脾不攝血而成血痢者當用理中湯加木香肉桂或用補中益氣湯加熟地炒乾姜治之而始愈也經驗久瀉血痢小腹作痛神效方秋梨四兩生薑五錢椿樹根皮一兩共搗爛夏布擰汁水空心服之立愈大小便門大便不通此症人以為大腸燥也誰知是肺氣燥乎蓋肺燥則清肅之氣不能下行於大腸而腎經之水僅足自顧又何能旁流以潤澗哉方用熟地元參各三兩升麻三錢牛乳一碗火麻仁一錢水二碗煎六分將牛乳同調服之一二劑必大便通此方不在潤大腸而在補腎大補肺夫人腸居於下流最難獨治必須從腎以潤之從肺以清之啟其上竅則下竅自然流動通利矣此下病上治之法也實症大便不通大黃五錢歸尾一兩升麻五分蜜半杯水煎服此方大黃泄利當歸以潤之仍以為君雖泄而不致十分猛烈不致有亡陰之弊況有升麻以提之則泄中有留又何必過慮哉虛症大便不通人有病後大便秘者方用熟地元參當歸各一兩川芎五錢桃仁十粒火麻仁一錢紅花大黃各三分蜜半杯水煎服小便不通膀胱之氣化不行即小便不通似宜治膀胱也然而治法全不在膀胱方用人參茯苓蓮子各三錢白果二錢甘草一錢肉桂車前子王不留各一錢水煎服此方妙在用人參肉桂蓋膀胱必得氣化而出氣化何也心包絡之氣也既用參桂而氣化行矣尤妙在用白果多不識此意白果通任督之脈走膀胱而引群藥況車前子王不留盡下泄之品服之而前陰有不利者乎又方熟地一兩山藥丹皮澤瀉肉桂車前子各一錢山萸四錢水煎服此不去通小便而專治腎水腎中有水而膀胱之氣自然行矣蓋膀胱之開合腎司其權也大小便不通頭髮燒灰研末用三指一捻入熱水半碗飲之立通又方蜜一茶杯皮硝一兩黃酒一茶杯大黃一錢煎一處溫服神效厥症門寒厥此症手足必青紫飲水必吐腹必痛喜火熨之方用人參三錢白朮一兩附子肉桂吳萸各一錢水煎服熱厥此症手足雖寒而不青紫飲水不吐火熨之腹必痛一時手足厥逆痛不可忍人以為四肢之風症也誰知是心中熱蒸外不能泄故四肢手足則寒而胸腹皮熱如火方用柴胡三錢當歸炒梔子黃連各二錢荊芥半夏枳殼各一錢水煎服二劑愈又方白芍一兩黑梔三錢陳皮柴胡各一錢花粉二錢水煎服以白芍為君取入肝而平木也屍厥此症一時猝倒不省人事乃氣虛而痰迷心也補氣化痰而已方用人參半夏南星各三錢白朮五錢附子五分白芥子一錢水煎服又方蒼朮三兩水煎灌之必吐吐後即愈蓋蒼朮陽藥善能祛風故有奇效厥症人有忽然發厥閉目撤手喉中有聲有一日死者有二三日死者此厥多犯神明然亦素有痰氣而發也治法宜攻痰而開心竅方用起迷湯人參半夏各五錢菖蒲二錢菟絲子一兩茯苓皂莢生薑各一錢甘草三分水煎服氣虛猝倒人有猝然而倒昏而不悟喉中有痰人以為風也誰知是氣虛乎若作風治無不死者此症蓋因平日不慎女色精虧以致氣衰又加不慎起居而有似乎風者其實非風也方用人參黃耆白朮各一兩茯苓五錢半夏二錢白芥子三錢菖蒲附子各一錢水煎服此方補氣而不治風消痰而不耗氣一劑神定二劑痰清三劑痊愈陰虛猝倒此症有腎中之水虛而不上交於心者又有肝氣燥不能生心之火者此皆陰虛而能令人猝倒者也方用再蘇丹熟地二兩山萸元參麥冬五味子各一兩茯苓五錢柴胡菖蒲各一錢白芥子三錢水煎服此方補腎水滋肺氣安心通竅瀉火消痰實有神功十劑痊愈陽虛猝倒人有心中火虛不能下交於腎而猝倒者陽虛也方用人參白朮生棗仁各一兩茯神五錢附子甘草各一錢生半夏三錢水煎服藥下喉則痰靜而氣出矣連服數劑則安然如故此症又有胃熱不能安心之火而猝倒者亦陽虛也方用人參元參各一兩石膏花粉各五錢麥冬三錢菖蒲一錢水煎服一劑心定二劑火清三劑痊愈胃虛猝倒人有口渴索飲眼紅氣喘心脈洪大舌不能言不可作氣虛治此乃腎虛之極不能上滋於心心火亢極自焚悶亂遂致身倒有如中風者法當補腎而佐以清火之藥方用水火兩治湯熟地當歸元參各一兩麥冬生地山萸茯神各五錢黃連白芥子五味子各三錢水煎服連服數劑而愈大怒猝倒人有大怒跳躍忽然臥地兩臂抽溺唇口歪斜左目緊閉此乃肝火血虛內熱生風之症當用八珍湯加丹皮鉤藤山梔若小便自遺左關脈弦洪而數此肝火血燥當用六味湯加鉤藤五味子麥冬川芎當歸愈後須改用補中益氣湯加丹皮山梔鉤藤多服如婦人得此症則逍遙散加鉤藤及六味湯便是治法中風不語人有跌倒昏迷或自臥而跌下床者此皆氣虛而痰邪犯之也方用三生引人參一兩半夏生南星生各三錢附子生一個水煎灌之此症又有因腎虛而得之者夫腎主藏精主下焦地道之生身衝任二脈系焉二脈與腎之大絡同出於腎之下起於胞之中其衝脈因稱胞絡為經脈之海遂名海焉其衝脈之上行者滲諸陽灌諸精精當為經之誤下行者滲諸陰灌諸絡而溫肌肉別絡結於跗因腎虛而腎絡與胞內絕不通於上則喑腎脈不上循喉嚨挾舌本則不能言二絡不通於下則痱厥矣方用地黃飲熟地巴戟山萸茯苓麥冬肉蓯蓉各一兩附子菖蒲五味子各五錢石斛六錢肉桂三錢薄荷姜棗水煎服口眼歪斜此症人多治木治金固是而不知胃土之為尤切當治胃土且有經脈之分經云足陽明之經急則口目為僻眥急不能視此胃土之經為歪斜也又云足陽明之脈挾口環唇口歪唇斜此胃土之脈為歪斜也二者治法皆當用黃耆當歸人參白芍甘草桂枝升麻葛根秦艽白芒防風黃柏蘇木紅花水酒各半煎微熱服如初起有外感者加蔥白三莖同煎取微汗自愈此症又有心中虛極不能運於口耳之間輕則歪斜重則不語方用人參茯苓菖蒲白芍各三錢白朮五錢半夏肉桂各二錢當歸一兩甘草一錢水煎服二劑愈又治法令一個抱住身子又一人抱住歪斜之耳輪再令一個手摩其歪斜之處至數百下使面上火熱而後己少頃口眼如故矣最神效半身不遂此症宜於心胃而調理之蓋心為天真神機開發之本胃是谷府充大真氣之標標本相得則心膈開之膻中氣海所留宗氣盈溢分布五臟三焦上下中外無不周遍若標本相失不能致其氣於氣海而宗氣散矣故分布不周於經脈則偏枯不周於五臟則喑即此言之未有不因真氣不周而病者也法宜黃耆為君參歸白芍為臣防風桂枝鉤藤竹瀝薑韭葛梨乳汁為佐治之而愈若雜投乎烏附羌活之類以涸榮而耗衛如此死者醫殺人也半身不遂回眼歪斜方用人參當歸白朮各五錢黃耆一兩半夏乾葛各三錢甘草一錢紅花二錢桂枝錢半姜三片棗二枚水二杯煎服此症人多用風藥治之殊不冗功此藥調理氣血故無不效癰症此症忽然臥地作牛馬豬羊之聲吐痰如湧泉者痰迷心竅也蓋因寒而成感寒而發也方用人參山藥半夏各三錢白朮一兩茯神薏仁各五錢肉桂附子各一錢水煎服又方人參茯神各一兩白朮五錢半夏南星附子柴胡各一錢草蒲三分水煎服此本治寒狂之方治癇亦效
