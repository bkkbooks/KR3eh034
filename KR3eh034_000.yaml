front:
  text: 序執成方而治病古今之大患也昔人云用古方治今病如拆舊屋蓋新房不經大匠之手經營如何得宜誠哉是言昔張仲景先生作傷寒論立一百一十三方言後世必有執其方以誤人者甚矣成方之不可執也然則今之女科一書何為而刻乎此書為傅青主徵君手著其居心與仲景同而立方與仲景異何言之仲景傷寒論雜症也有五運六氣之殊有中表傳裡之異或太陽或太陰不一其秉或內傷外感不一其原或陽極似陰陰極似陽不一其狀非精心辨證因病制方斷不能易危就安應手即愈此書則不然其方專為女科而設其症則為婦女所同帶下血崩調經種子以及胎前產後人雖有虛實寒熱之分而方則極平易精詳之至故用之當時而後傳之後世而無不效非若傷寒雜病必待臨證詳審化裁通變始無詒誤也嘗慨後世方書汗牛充棟然或偏攻偏補專於一家主熱主寒堅執謬論炫一已之才華失古人之精奧仲景而後求其貫徹靈素能收十全之效者不數數覯讀徵此書談症不落古人窠臼制方不失古人準繩用藥純和無一峻品辨證詳明一目瞭然病重者十劑奏功病淺者數服立愈較仲景之傷寒論方雖不同而濟世之功則一也此書晉省抄本甚多然多秘而不傳間有減去藥味錯亂分量者彼此參證多不相符茲不揣冒昧詳校而重刊之竊願家置一編遇症翻撿照方煎服必立起沉疴並登壽域或亦濟人利世之一端也夫道光十一年新正上元同里後學祁爾誠謹序序世傳先生字不如詩詩不如畫畫不如醫醫不如人先生之高遠固不可以區區之醫見也而先生有所著性史十三經字區周易偶釋周禮音辨條春秋人名地名韻兩漢人名韻等書不概見於世雖欲言先生之高莫之由也今讀先生之傳想先生之為人豈非所謂天子不得臣諸侯不得友者歟先生有女科傳於世平嘗遵治家人婦女無一不效嘗語人曰先生女科神乎神矣惜未有男科傳焉或謂子不聞諺乎能治十男子不治一婦人女科難男科易故有傳有不傳耳似也而心疑之癸亥同治二年公元年秋有邦定羅公持先生男科小兒科以相示平見而奇之究其所從來羅曰道光初年余家刻印先生女科是時平定州孫毓芝先生為余家西席由平定州攜至舍下余錄之藏筒已四十餘年矣今有鄉人生產胞衣不下求方於余余搜女科而得此因子好女科而特為相示平受而讀之欲付手民而窘於貲冬十月有寶翰羅公正南王公書銘安公敦友羅公亦善此書於是各捐板資於親友以共成其事願仁人君子勿視此為易易先生此書只言病之形不論病之脈明白顯易使人一刻而即知其病是寒是熱屬實屬虛真深入而顯出似易而實難也非深精脈理不能為此先生蓋精於岐黃而通以儒義不囿於叔和丹溪之言而獨有所見探古人未探之本傳古人未傳之妙實大有益於人世能救死於呼吸之間也平本才疏不足為先生序而梓人索序孔極待觀者又欲速成其書為述其稿之所由來版之所由成以待能文之士棄此而重為之序是則此書之深幸耳同治二年十二月康衢王道平識
