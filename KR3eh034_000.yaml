body:
  text: 敘敘者敘其平生之節義著作也著作醫方留於後世足證其二節義高才聞於天下尤能明志懿歟休哉傅青主先生著作不止醫方節義獨善其身先生之節莫能磨先生之醫功德豈可量哉余愛先生之節仰之不逮慕先生之醫學之不及觀先生之書未見各省皆刻欲付梓人而兩手空虛余旅中湘由丙戌春與同人談及此書之明顯皆樂於助資公諸於世者未嘗非先生之節義流露而遺書以救世耳略為之敘光緒十二年中秋節後汾邑田嵩峻撰書明空員傅山先生傳提督學政嵇曾筠撰傅先生名山字青主一字公佗陽曲人祖霖官山東遼海參議父之漠明經授徒號離垢先生山生而穎異讀書十行並下過目輒能成誦年十四督學文太青拔入庫繼文者袁臨侯先生繼成也一見深器之准食餼檄取讀書三立書院時時以道學相期許山益發憤下帷袁每云山文誠佳恨未脫山林氣耳崇禎丙子繼成為直指張孫振誣詆下獄山徒步走千里外伏闕訟冤孫震怒大索山山敝衣襤褸轉徙自匿百折不回繼戚冤得白當是時山義聲聞天下後繼戚官南方數召山山終不往國朝定鼎自九江執繼成北上山乃潛入都密候繼成起居繼咸見殺山收其遺藁而歸山性至孝父之謨病篤朝夕稽穎於神願以身代旬日父愈人謂孝通神明不異黔婁云執親喪哀毀特甚苫塊米飲不茹蔬果友愛諸季先人遺產弟蕩費強半終身無怨色弟歿撫遺孤過於已子失偶時年二十七子眉甫五齡旁無妾膳誓不復娶於裡黨姻戚竭力賙其緩急為人分別有讓恭儉下人與人言依於忠孝謀事要於誠實蓋其敦厚彝倫根本自然非有強也自李自成犯京師明莊烈皇帝殉國山遂絕意進取棄青衿為黃冠號石道人蘀衣草履時遨遊於平定祁汾間所至有墨痕筆跡工詩賦善古文詞臨池得二王神理該博古今典籍百家諸子靡晃淹貫大叩大鳴小叩小鳴復自托繪事寫意曲盡其妙精岐黃術邃於脈理而時通以儒義不拘拘於叔和丹溪之言踵門求醫者戶常滿貴賤一視之家故饒至是漸益窶安貧樂道泊如也屋舍田園多為細人竊據概置不問康熙戊午詔舉博學宏詞廷臣交章薦山山堅以老病辭當事者立迫就道道稱股病不能行肩輿舁入都臥旅邸不赴試滿漢王公九卿賢士大夫下逮馬醫夏畦市井細民莫不重山行義就見者羅溢其門子眉送迎常不及山但欹榻上言衰老不可為禮諸貴人以此重山弗之怪也明年三月吏部驗病入告奉旨傅山文學素著念其年邁特授內閣中書著地方官存問遂得放歸歸愈淡泊自甘僻居遠村不入城府然欽其名者益眾率紆道往見冀得一面為榮又六年卒遠近會葬者數千百人山所著有性史十三經字區周易偶釋周禮音辨條春秋人名韻地名韻兩漢人名韻等書稽禮齋曰昔者嘗怪先生值堯舜之世篤志高尚懇辭徵闢何其果也及讀漢史見周黨王霸之為人初不辱於新莽建武復辟連徵不起乃知士各有志先生蓋在道而隱者也彼誠見夫有明末季上下交徵利卒滅亡於寇盜之手固已心寄夫長林豐草矣寧復以青紫為榮耶至若義白知已之冤其賢於世之平居師友相親慕臨難揹負不一引手救漠然若不相識者亦遠矣古云民生於三事之如一惟其所在則致死焉先生真無愧哉贊曰於惟先生得聖之清訟冤奔訃蒙難不驚辭榮卻聘先民是程功在名教百世景行鐵城寄傅青主附札二首附錄霜紅龕集獨子同憂患於今乃別離乾坤留古道生死見心知貫械還余草傳燈不以詩悠悠千載業努力慰相思江州求死不得至今只得為其從容者聞黃冠入山養母甚善此時不可一步出山也有詩一冊付曲沃錫屬致門下藏之山中矣可到未乙酉冬季前詩到未若未到門下不可往取可屬西河曹孝廉碩公緩頰取之必藏之門下所目令著經觀史觀二書經觀薄就矣史觀尚未竟不知能終竟此業否晉士惟門下知我甚深不遠蓋棺斷不敢負門下知之使異日羞稱袁繼成為友生也丙寅初秋徵君傅山傳傅山字青主一字公佗太原府人母夢老比丘而生生復不啼一瞽僧至門云既來何必不啼乃啼六歲食黃精不樂穀食強之乃復食讀十三經諸子史如宿通者崇禎十年袁臨侯繼賢督學山西為巡按御史張孫振誣劾被逮山橐饘左右伏闕上書白其冤諭德馬群常世奇作山右二義士傳謂山與汾陽薛宗周比之裴瑜魏劭亂後夢天帝賜黃冠衲衣遂為道士裝醫木入神有司以醫見則見不然不見也康熙戊午徵聘至京師以老病辭已未與范陽杜樾俱授內閣中書舍人歸里山工八分隸及金石篆刻畫入逸品子眉字壽髦亦工畫作古賦數十篇常鬻藥四方兒子共挽車暮抵逆旅輒篝燈課讀經史騷賦選諸書詰旦成誦乃行否即與杖
